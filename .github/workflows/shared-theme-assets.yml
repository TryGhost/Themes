name: Shared Theme Assets
on:
  pull_request:
    paths:
      - 'packages/_shared/**'
      - '.github/workflows/shared-theme-assets.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/_shared/**'
      - '.github/workflows/shared-theme-assets.yml'

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@v6
      - run: yarn
      - run: yarn test:ci --theme taste  # sanity check with one theme

  dry-run:
    name: Dry run
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Dry run publish
        working-directory: packages/_shared
        run: npm publish --provenance --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Check if version is new
        id: check
        working-directory: packages/_shared
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @tryghost/shared-theme-assets version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/_shared
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Tag release
        if: steps.check.outputs.skip == 'false'
        run: |
          git tag "v${{ steps.check.outputs.version }}"
          git push origin "v${{ steps.check.outputs.version }}"
